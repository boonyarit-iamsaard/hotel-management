name: 'hotel-management'

services:
  postgres:
    container_name: 'hotel-management-postgres'
    image: 'docker.io/postgres:17-alpine'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-hotel-management}
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: 'always'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hotel-management-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -h localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    container_name: 'hotel-management-mailpit'
    image: 'docker.io/axllent/mailpit:latest'
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '${MAILPIT_DASHBOARD_PORT:-8025}:8025'
    restart: 'always'
    networks:
      - hotel-management-network

volumes:
  pgdata:
    name: 'hotel-management-pgdata'

networks:
  hotel-management-network:
    name: 'hotel-management-network'
